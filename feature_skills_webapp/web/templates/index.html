<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="dark">
<title>Inbox — feature-skills-webapp</title>
<style>
  :root {
    --bg: #1c1917;
    --surface: #292524;
    --surface-muted: #1f1d1c;
    --border: #44403c;
    --accent: #f59e0b;
    --accent-soft: #92400e;
    --text: #fafaf9;
    --text-muted: #d6d3d1;
    --text-faint: #a8a29e;
  }
  * { box-sizing: border-box; }
  html { font-size: 18px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 0;
    line-height: 1.6;
  }

  .page { max-width: 860px; margin: 0 auto; padding: 32px 24px 80px; }

  header.page-header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
    margin-bottom: 28px;
  }
  header.page-header h1 {
    margin: 0 0 4px;
    font-size: 1.5rem;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  header.page-header p {
    margin: 0;
    color: var(--text-faint);
    font-size: 0.9rem;
  }

  /* Chips */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 28px;
  }
  .chip {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.85rem;
    transition: border-color 0.1s, color 0.1s;
  }
  .chip:hover { border-color: var(--accent); color: var(--text); text-decoration: none; }
  .chip.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); font-weight: 600; }

  /* Category sections */
  .category { margin-bottom: 36px; }
  .category h2 {
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-faint);
    margin: 0 0 12px;
  }

  /* Cards */
  .card-list { list-style: none; margin: 0; padding: 0; }
  a.card-link {
    display: block;
    text-decoration: none;
    color: inherit;
    border-radius: 6px;
    margin-bottom: 6px;
    outline-offset: 2px;
  }
  a.card-link:focus-visible {
    outline: 2px solid var(--accent);
  }
  a.card-link .card { margin-bottom: 0; }
  .card {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 6px;
  }
  .card-project {
    font-size: 0.78rem;
    color: var(--text-faint);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .card-feature {
    font-weight: 500;
    color: var(--text);
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card-label {
    font-size: 0.8rem;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .card-time {
    font-size: 0.78rem;
    color: var(--text-faint);
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* Empty / not-configured states */
  .state-panel {
    text-align: center;
    padding: 48px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .state-panel p {
    margin: 0 0 8px;
    color: var(--text-muted);
  }
  .state-panel p:last-child { margin-bottom: 0; }
  .state-panel .hint { color: var(--text-faint); font-size: 0.9rem; }
</style>
</head>
<body>
<div class="page">

  <header class="page-header">
    <h1>Inbox</h1>
    <p>Cross-project feature activity</p>
  </header>

  <div id="inbox-body">{% include "_inbox_body.html" %}</div>

</div>
<script>
  window.addEventListener('pageshow', (e) => { if (e.persisted) location.reload(); });

  const es = new EventSource('/events');
  let timer = null;
  function scheduleRefetch() {
    clearTimeout(timer);
    timer = setTimeout(refetchInbox, 250);
  }
  async function refetchInbox() {
    const params = new URLSearchParams(window.location.search);
    params.set('fragment', '1');
    const resp = await fetch('/?' + params.toString());
    if (!resp.ok) return;
    document.getElementById('inbox-body').innerHTML = await resp.text();
  }
  es.onmessage = scheduleRefetch;
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) scheduleRefetch();
  });
</script>
</body>
</html>
